<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign Up | MH Wellbeing Tracker</title>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:560px;margin:60px auto;">
      <h2 style="font-size:26px;margin-bottom:6px;">Create your account</h2>
      <p class="muted" style="margin-top:0;">This will save your details in SQL Server and enable login.</p>
      <hr/>

      <form class="form" id="signupForm">
        <div class="field">
          <label>Full name</label>
          <input id="fullName" type="text" placeholder="Ali Rehman" required />
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="Choose a password" required />
        </div>

        <div class="row">
          <label class="muted" style="display:flex;gap:8px;align-items:center;">
            <input id="consentGiven" type="checkbox" checked />
            I give consent to store my wellbeing logs.
          </label>
        </div>

        <button class="btn primary" type="submit" style="width:100%;">Create account</button>

        <p class="muted" style="margin:10px 0 0;">
          Already have an account? <a class="link" href="/login.html">Login</a>
        </p>
      </form>
    </div>
  </div>

  <script type="module">
    import { api } from "/assets/js/api.js";
    import { setToken } from "/assets/js/auth.js";
    import { toast } from "/assets/js/ui.js";

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const consentGiven = document.getElementById("consentGiven").checked;

      try {
        const data = await api.signup({
          fullName,
          email,
          password,
          consentGiven,
          isAnonymous: false
        });

        // Your signup endpoint returns token + user
        setToken(data.token);
        toast("Account created ✅");
        window.location.href = "/dashboard.html";
      } catch (err) {
        toast(err.message, "err");
        alert("Signup failed: " + err.message);
      }
    });
  </script>
</body>
</html>
