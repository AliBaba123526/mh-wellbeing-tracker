<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sleep | MH Wellbeing Tracker</title>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <div class="nav">
    <div class="nav-inner">
      <div class="brand"><span>MH Wellbeing Tracker</span><span class="badge">Sleep</span></div>
      <div class="nav-links">
        <a class="link" href="/dashboard.html">Dashboard</a>
        <a class="link" href="/mood.html">Mood</a>
        <a class="link" href="/sleep.html">Sleep</a>
        <a class="link" href="/journal.html">Journal</a>
        <a class="link" href="/activity.html">Activity</a>
        <a class="link" href="/insights.html">Insights</a>
      </div>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="grid grid-2">

      <!-- FORM CARD -->
      <div class="card">
        <h2>Log your sleep</h2>
        <p class="muted">Record how long you slept and the quality.</p>
        <hr/>

        <form class="form" id="sleepForm">
          <div class="field">
            <label>Sleep hours</label>
            <input id="sleepHours" type="number" step="0.1" min="0" max="24" placeholder="e.g. 7.5" required />
          </div>

          <div class="field">
            <label>Sleep quality</label>
            <select id="sleepQuality">
              <option value="">Select quality</option>
              <option value="Poor">Poor</option>
              <option value="Average">Average</option>
              <option value="Good">Good</option>
              <option value="Excellent">Excellent</option>
            </select>
          </div>

          <button class="btn primary" type="submit">Save sleep log</button>
        </form>
      </div>

      <!-- TABLE CARD -->
      <div class="card">
        <h2>Recent sleep logs</h2>
        <p class="muted">Your most recent sleep records.</p>
        <hr/>

        <div style="overflow:auto">
          <table class="table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Hours</th>
                <th>Quality</th>
              </tr>
            </thead>
            <tbody id="sleepRows"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { api } from "/assets/js/api.js";
    import { clearToken, requireLogin } from "/assets/js/auth.js";
    import { fmtDate, toast } from "/assets/js/ui.js";

    requireLogin();

    document.getElementById("logoutBtn").onclick = () => {
      clearToken();
      window.location.href = "/login.html";
    };

    async function renderSleep() {
      const rows = await api.sleepList();
      const body = document.getElementById("sleepRows");

      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="3" class="muted">No sleep logs yet.</td></tr>`;
        return;
      }

      body.innerHTML = rows.map(r => `
        <tr>
          <td>${fmtDate(r.LoggedAt)}</td>
          <td>${r.SleepHours ?? ""}</td>
          <td>${r.SleepQuality ?? ""}</td>
        </tr>
      `).join("");
    }

    document.getElementById("sleepForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const sleepHours = Number(document.getElementById("sleepHours").value);
      const sleepQuality = document.getElementById("sleepQuality").value || null;

      try {
        await api.sleepCreate({ sleepHours, sleepQuality });
        toast("Sleep log saved ✅");
        document.getElementById("sleepForm").reset();
        await renderSleep();
      } catch (err) {
        toast(err.message, "err");
        alert("Error: " + err.message);
      }
    });

    renderSleep().catch(err => toast(err.message, "err"));
  </script>
</body>
</html>
